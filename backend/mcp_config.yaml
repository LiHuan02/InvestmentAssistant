mcp_servers:

  alpha_vantage:
    enabled: true
    transport: streamable_http
    url: "https://mcp.alphavantage.co/mcp"
    env:
      ALPHAVANTAGE_API_KEY: "${ALPHAVANTAGE_API_KEY}"

  brave_search:
    enabled: true
    command: npx
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    transport: stdio
    env:
      BRAVE_API_KEY: "${BRAVE_API_KEY}"

