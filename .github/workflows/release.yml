name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Desktop builds (Tauri + PyInstaller sidecar) ──
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Python + uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync

      - name: Install PyInstaller
        run: |
          cd backend
          uv run pip install pyinstaller

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Python sidecar (Unix)
        if: matrix.platform != 'windows-latest'
        run: bash scripts/build-sidecar.sh

      - name: Build Python sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        run: powershell -File scripts/build-sidecar.ps1

      - name: Generate macOS icon
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     src-tauri/icons/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     src-tauri/icons/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src-tauri/icons/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     src-tauri/icons/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src-tauri/icons/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   src-tauri/icons/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src-tauri/icons/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   src-tauri/icons/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src-tauri/icons/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 src-tauri/icons/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o src-tauri/icons/icon.icns
          rm -rf icon.iconset

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Investment Assistant ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads
            - **Windows**: `.exe` installer
            - **macOS (Apple Silicon)**: `.dmg`
            - **macOS (Intel)**: `.dmg`
            - **Linux**: `.AppImage` and `.deb`
            - **Android**: `.apk`

            ## Changes
            See commit history for details.
          releaseDraft: true
          prerelease: false
          args: '--target ${{ matrix.target }}'

  # ── Android APK build (Capacitor + Chaquopy) ──
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Sync Capacitor
        run: |
          cd frontend
          npx cap sync android

      - name: Copy backend Python sources
        run: |
          BACKEND_SRC=frontend/android/app/src/main/python/backend
          mkdir -p "$BACKEND_SRC"
          cp -r backend/* "$BACKEND_SRC/" 2>/dev/null || true
          cp android_server.py frontend/android/app/src/main/python/

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/android/**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          cd frontend/android
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK (if keystore available)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release-key.jks
          APK_PATH="frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$APK_PATH" ]; then
            $ANDROID_HOME/build-tools/*/apksigner sign \
              --ks release-key.jks \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --key-alias "$KEY_ALIAS" \
              --ks-key-alias "$KEY_ALIAS" \
              --out "InvestmentAssistant-${{ github.ref_name }}.apk" \
              "$APK_PATH"
          fi

      - name: Rename unsigned APK (fallback)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: |
          APK_PATH="frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "InvestmentAssistant-${{ github.ref_name }}-unsigned.apk"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: InvestmentAssistant-*.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: InvestmentAssistant-*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
