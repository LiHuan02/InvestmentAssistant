name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Desktop builds ──
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar-name: investment-backend-aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            sidecar-name: investment-backend-x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-name: investment-backend-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-name: investment-backend-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ── System deps (Linux only) ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust ──
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Python ──
      - name: Install Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install Python deps + PyInstaller
        run: |
          cd backend
          uv sync
          uv run pip install pyinstaller

      # ── Node.js ──
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # ── Build frontend (before Tauri) ──
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── Build Python sidecar ──
      # The spec is a one-file build. Tauri externalBin must receive the
      # complete executable, not the old onedir launcher.
      - name: Build sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          cd backend
          uv run pyinstaller investment-backend.spec --clean --noconfirm
          mkdir -p ../src-tauri/binaries
          cp dist/investment-backend "../src-tauri/binaries/${{ matrix.sidecar-name }}"
          chmod +x "../src-tauri/binaries/${{ matrix.sidecar-name }}"
          test -x "../src-tauri/binaries/${{ matrix.sidecar-name }}"

      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd backend
          uv run pyinstaller investment-backend.spec --clean --noconfirm
          New-Item -ItemType Directory -Force -Path ../src-tauri/binaries | Out-Null
          Copy-Item "dist/investment-backend.exe" "../src-tauri/binaries/${{ matrix.sidecar-name }}"
          if (-not (Test-Path "../src-tauri/binaries/${{ matrix.sidecar-name }}")) { throw "Sidecar not found" }

      # ── macOS icon ──
      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     src-tauri/icons/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     src-tauri/icons/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src-tauri/icons/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     src-tauri/icons/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src-tauri/icons/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   src-tauri/icons/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src-tauri/icons/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   src-tauri/icons/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src-tauri/icons/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 src-tauri/icons/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o src-tauri/icons/icon.icns
          rm -rf icon.iconset

      # ── Install Tauri CLI ──
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── Build Tauri ──
      # The frontend is already built above. Tauri runs from src-tauri, so a
      # relative `cd ../frontend` in beforeBuildCommand is not valid in CI.
      - name: Set release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          python - <<'PY'
          import json, os
          from pathlib import Path
          version = os.environ["VERSION"]
          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = version
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n")
          cargo_path = Path("src-tauri/Cargo.toml")
          cargo_path.write_text(
              cargo_path.read_text().replace(
                  'version = "1.0.3"', f'version = "{version}"', 1
              )
          )
          PY
          grep -n '"version"' src-tauri/tauri.conf.json
          grep -n '^version' src-tauri/Cargo.toml | head -1

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      # ── Upload artifacts ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: error

  # ── Create Release ──
  release:
    needs: [desktop, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: artifacts/**/*
          draft: true
          body: |
            ## Downloads

            - **Windows**: `.exe` (NSIS installer)
            - **macOS (Apple Silicon)**: `.dmg`
            - **macOS (Intel)**: `.dmg`
            - **Linux**: `.AppImage` / `.deb`
            - **Android**: `.apk`

  # ── Android APK ──
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set Android release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$(VERSION="$VERSION" python -c "import os; print(int(os.environ['VERSION'].replace('.', '')))")
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/; s/versionName \".*\"/versionName \"$VERSION\"/" frontend/android/app/build.gradle
          grep -nE 'versionCode|versionName' frontend/android/app/build.gradle

      - name: Sync Capacitor
        run: |
          cd frontend
          npx cap sync android

      - name: Copy Android server
        run: |
          DEST=frontend/android/app/src/main/python
          rm -rf "$DEST"
          mkdir -p "$DEST/android_backend" "$DEST/frontend"
          cp android_server.py "$DEST/"
          cp android_backend/*.py "$DEST/android_backend/"
          cp -r frontend/dist "$DEST/frontend/"
          test -f "$DEST/android_server.py"
          test -f "$DEST/android_backend/__init__.py"
          test -f "$DEST/android_backend/market.py"
          test -f "$DEST/android_backend/news.py"
          test -f "$DEST/android_backend/chat.py"
          test -f "$DEST/frontend/dist/index.html"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/android/**/*.gradle', 'frontend/android/**/*.gradle.*') }}

      - name: Build Debug APK
        run: |
          cd frontend/android
          chmod +x ./gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon

      - name: Find APK
        id: find-apk
        run: |
          APK=$(find frontend/android/app/build/outputs -name "*-debug.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "InvestmentAssistant-${{ github.ref_name }}.apk"
            echo "found=true" >> $GITHUB_OUTPUT
            echo "apk=$APK" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK
        if: steps.find-apk.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: InvestmentAssistant-*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
